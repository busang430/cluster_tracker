<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">42 Cluster Time Tracker install flow</title>
  <desc id="desc">A four step diagram showing credentials, Chrome extension loading, Matrix refresh, and fresh API status.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="300" fill="#f8fafc"/>
  <text x="48" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Install in four minutes</text>
  <text x="48" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">Load the repository root, then refresh Matrix after every extension reload.</text>

  <g filter="url(#shadow)">
    <rect x="48" y="112" width="170" height="126" rx="14" fill="#ffffff" stroke="#dbe3ea"/>
    <rect x="270" y="112" width="170" height="126" rx="14" fill="#ffffff" stroke="#dbe3ea"/>
    <rect x="492" y="112" width="170" height="126" rx="14" fill="#ffffff" stroke="#dbe3ea"/>
    <rect x="714" y="112" width="170" height="126" rx="14" fill="#ffffff" stroke="#dbe3ea"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <circle cx="82" cy="146" r="18" fill="#2563eb"/>
    <text x="77" y="152" font-size="16" font-weight="700" fill="#ffffff">1</text>
    <text x="106" y="141" font-size="16" font-weight="700" fill="#0f172a">Credentials</text>
    <text x="72" y="178" font-size="13" fill="#475569">Fill CLIENT_ID and</text>
    <text x="72" y="198" font-size="13" fill="#475569">CLIENT_SECRET in</text>
    <text x="72" y="218" font-size="13" fill="#475569">background.js.</text>

    <circle cx="304" cy="146" r="18" fill="#0f766e"/>
    <text x="299" y="152" font-size="16" font-weight="700" fill="#ffffff">2</text>
    <text x="328" y="141" font-size="16" font-weight="700" fill="#0f172a">Load unpacked</text>
    <text x="294" y="178" font-size="13" fill="#475569">Open chrome://extensions</text>
    <text x="294" y="198" font-size="13" fill="#475569">and select D:\42\cluster.</text>

    <circle cx="526" cy="146" r="18" fill="#ea580c"/>
    <text x="521" y="152" font-size="16" font-weight="700" fill="#ffffff">3</text>
    <text x="550" y="141" font-size="16" font-weight="700" fill="#0f172a">Refresh Matrix</text>
    <text x="516" y="178" font-size="13" fill="#475569">Open matrix.42lyon.fr,</text>
    <text x="516" y="198" font-size="13" fill="#475569">log in, then refresh</text>
    <text x="516" y="218" font-size="13" fill="#475569">the page.</text>

    <circle cx="748" cy="146" r="18" fill="#7c3aed"/>
    <text x="743" y="152" font-size="16" font-weight="700" fill="#ffffff">4</text>
    <text x="772" y="141" font-size="16" font-weight="700" fill="#0f172a">Check status</text>
    <text x="738" y="178" font-size="13" fill="#475569">The panel should show</text>
    <text x="738" y="198" font-size="13" fill="#475569">Fresh ... latest ...</text>
    <text x="738" y="218" font-size="13" fill="#475569">after API sync.</text>
  </g>

  <line x1="230" y1="175" x2="258" y2="175" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="452" y1="175" x2="480" y2="175" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="674" y1="175" x2="702" y2="175" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
