<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340" role="img" aria-labelledby="title desc">
  <title id="title">API status guide</title>
  <desc id="desc">A diagram explaining fresh data, startup cache, cache fallback, and API error states.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="960" height="340" fill="#fbfcfe"/>
  <text x="48" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Read the panel status first</text>
  <text x="48" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#475569">The status line tells you whether the panel is showing new API data or a local fallback.</text>

  <g filter="url(#shadow)">
    <rect x="48" y="110" width="410" height="78" rx="14" fill="#ecfdf5" stroke="#86efac"/>
    <rect x="502" y="110" width="410" height="78" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
    <rect x="48" y="218" width="410" height="78" rx="14" fill="#fff7ed" stroke="#fdba74"/>
    <rect x="502" y="218" width="410" height="78" rx="14" fill="#fef2f2" stroke="#fca5a5"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <circle cx="84" cy="149" r="13" fill="#16a34a"/>
    <path d="M78 149 l4 4 l8 -9" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="112" y="143" font-size="17" font-weight="700" fill="#14532d">Fresh ... latest ...</text>
    <text x="112" y="166" font-size="13" fill="#166534">The newest request to the 42 API succeeded.</text>

    <circle cx="538" cy="149" r="13" fill="#2563eb"/>
    <text x="534" y="154" font-size="14" font-weight="700" fill="#ffffff">i</text>
    <text x="566" y="143" font-size="17" font-weight="700" fill="#1e3a8a">Cached ...</text>
    <text x="566" y="166" font-size="13" fill="#1d4ed8">Startup restored local data before the fresh fetch finished.</text>

    <circle cx="84" cy="257" r="13" fill="#ea580c"/>
    <text x="80" y="262" font-size="16" font-weight="700" fill="#ffffff">!</text>
    <text x="112" y="251" font-size="17" font-weight="700" fill="#7c2d12">Using cached ...</text>
    <text x="112" y="274" font-size="13" fill="#9a3412">The API failed, so the panel is showing the previous cache.</text>

    <circle cx="538" cy="257" r="13" fill="#dc2626"/>
    <text x="534" y="262" font-size="16" font-weight="700" fill="#ffffff">x</text>
    <text x="566" y="251" font-size="17" font-weight="700" fill="#7f1d1d">API error ...</text>
    <text x="566" y="274" font-size="13" fill="#991b1b">The request failed and no usable fallback was loaded.</text>
  </g>
</svg>
